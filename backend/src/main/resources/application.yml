# 服务端口
server:
  port: 8080

spring:
  application:
    name: campus-help-backend

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_help?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.campushelp.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:604800000}  # 7天，单位毫秒

# 日志配置
logging:
  level:
    com.campushelp: debug
    com.baomidou.mybatisplus: debug

# ============================================
# 应用自定义配置
# ============================================
app:
  # 文件上传路径
  upload:
    path: uploads

  # 平台服务费比例（可被数据库 sys_config 覆盖）
  platform-fee-rate: 0.05

  # 支付宝回调地址
  alipay-notify-url: http://localhost:8080/api/pay/alipay/notify

# ============================================
# 微信小程序配置
# ============================================
wechat:
  appid: ${WECHAT_APPID:wx491e4b37ff5d0130}
  secret: ${WECHAT_SECRET}
  # 微信登录接口
  login-url: https://api.weixin.qq.com/sns/jscode2session

# ============================================
# 支付宝沙箱配置
# ============================================
alipay:
  app-id: ${ALIPAY_APP_ID:9021000164657830}
  private-key: ${ALIPAY_PRIVATE_KEY}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY}
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  notify-url: ${ALIPAY_NOTIFY_URL:http://localhost:8080/api/pay/alipay/notify}
  sign-type: RSA2
  charset: UTF-8
  format: json

# ============================================
# 腾讯地图 Key（用于地图选点、距离计算）
# ============================================
map:
  tencent:
    key: OOUBZ-xxxxx-xxxxx-xxxxx-xxxxx-xxxxx   # 替换为你的腾讯地图 Key
    # 逆地理编码
    geocoder-url: https://apis.map.qq.com/ws/geocoder/v1/

# ============================================
# 百度 OCR 配置（用于学生证识别）
# ============================================
baidu:
  ocr:
    app-id: "12345678"                        # 替换为百度 OCR AppID
    api-key: xxxxxxxxxxxxxxxxxxxxxxxx          # 替换为百度 OCR API Key
    secret-key: xxxxxxxxxxxxxxxxxxxxxxxx       # 替换为百度 OCR Secret Key
    # 通用文字识别接口
    url: https://aip.baidubce.com/rest/2.0/ocr/v1/general_basic
